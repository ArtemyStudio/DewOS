set default=0
set timeout=5
set timeout_style=menu
set gfxmode=1024x768x32

insmod all_video
insmod gfxterm

serial --unit=0 --speed=115200
terminal_input console serial
terminal_output gfxterm serial

menuentry "DewOS" {
    set gfxpayload=1024x768x16,1024x768
    linux /boot/vmlinuz-dewos console=tty1 rdinit=/init quiet loglevel=0 vt.global_cursor_default=0 nokaslr
    initrd /boot/initramfs.cpio.gz
}

menuentry "DewOS (safe text)" {
    set gfxpayload=text
    linux /boot/vmlinuz-dewos console=tty1 console=ttyS0,115200 earlyprintk=serial,ttyS0,115200 earlycon=uart,io,0x3f8,115200 rdinit=/init loglevel=4 vt.global_cursor_default=1 nomodeset nokaslr
    initrd /boot/initramfs.cpio.gz
}

menuentry "DewOS (debug)" {
    set gfxpayload=text
    linux /boot/vmlinuz-dewos console=tty1 console=ttyS0,115200 earlyprintk=serial,ttyS0,115200 earlycon=uart,io,0x3f8,115200 rdinit=/init loglevel=7 vt.global_cursor_default=1 nomodeset nokaslr
    initrd /boot/initramfs.cpio.gz
}
